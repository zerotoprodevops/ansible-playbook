---
- name: Install and start Apache HTTPD
  hosts: web
  become: true

  tasks:
    - name: Ensure httpd package is installed
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Correct index.html is present
      ansible.builtin.copy:
        src: files/index.html
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Ensure httpd server is enbaled
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Configure firewall to allow http service
      ansible.posix.firewalld:
        service: http
        permanent: true
        immediate: true
        state: enabled
